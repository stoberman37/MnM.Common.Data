# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  push:
    branches: 
      - main
      - feature/*
      - bugfix/*
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      checks: write
      security-events: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"

    - name: Upload test results
      uses: dorny/test-reporter@v2
      if: always()
      with:
        name: .NET Tests
        path: TestResults/*.trx
        reporter: dotnet-trx

    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5
      if: always()
      with:
        reports: TestResults/**/coverage.cobertura.xml
        targetdir: CoverageReport
        reporttypes: MarkdownSummaryGithub;Html

    - name: Write coverage to job summary
      if: always()
      shell: bash
      run: |
        if [ -f CoverageReport/SummaryGithub.md ]; then
          cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "No coverage summary found (CoverageReport/SummaryGithub.md)." >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: CoverageReport/

    - name: Setup Snyk
      uses: snyk/actions/setup@master

    - name: Snyk - Open Source dependency scan
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        snyk test --severity-threshold=high --all-projects \
          --sarif-file-output=snyk-oss.sarif \
          --json-file-output=snyk-oss.json || true

    - name: Snyk OSS summary
      if: always()
      continue-on-error: true
      run: |
        echo "## 🔒 Snyk OSS Scan" >> $GITHUB_STEP_SUMMARY
        if [ -f snyk-oss.json ]; then
          CRITICAL=$(jq '[.[].vulnerabilities[] | select(.severity=="critical")] | length' snyk-oss.json || echo "0")
          HIGH=$(jq '[.[].vulnerabilities[] | select(.severity=="high")] | length' snyk-oss.json || echo "0")
          MEDIUM=$(jq '[.[].vulnerabilities[] | select(.severity=="medium")] | length' snyk-oss.json || echo "0")
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No Snyk OSS results found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Snyk OSS results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('snyk-oss.sarif') != ''
      continue-on-error: true
      with:
        sarif_file: snyk-oss.sarif
        category: snyk-oss

    - name: Snyk - Code scan (SAST)
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        snyk code test --severity-threshold=high \
          --sarif-file-output=snyk-code.sarif \
          --json-file-output=snyk-code.json || true

    - name: Snyk Code summary
      if: always()
      continue-on-error: true
      run: |
        echo "## 🛡️ Snyk Code Scan (SAST)" >> $GITHUB_STEP_SUMMARY
        if [ -f snyk-code.sarif ]; then
          HIGH=$(jq '[.runs[].results[] | select(.level=="error")] | length' snyk-code.sarif || echo "0")
          MEDIUM=$(jq '[.runs[].results[] | select(.level=="warning")] | length' snyk-code.sarif || echo "0")
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No Snyk Code SARIF results found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Snyk Code results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('snyk-code.sarif') != ''
      continue-on-error: true
      with:
        sarif_file: snyk-code.sarif
        category: snyk-code